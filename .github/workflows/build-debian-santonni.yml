name: Build Debian for Redmi 4X santoni
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y debootstrap qemu-user-static binfmt-support gcc-arm-linux-gnueabihf libssl-dev bc flex bison git make kmod cpio rsync debian-archive-keyring parted dosfstools u-boot-tools

      - name: Build Debian
        run: |
          set -e
          WORKDIR="$HOME/debian"
          mkdir -p "$WORKDIR"
          cd "$WORKDIR"

          sudo debootstrap --arch=armhf --no-check-gpg --foreign bookworm rootfs https://mirrors.tuna.tsinghua.edu.cn/debian/
          sudo cp /usr/bin/qemu-arm-static rootfs/usr/bin/
          sudo chroot rootfs /debootstrap/debootstrap --second-stage

          sudo chroot rootfs bash -c '
          echo "root:root" | chpasswd
          cat > /etc/apt/sources.list <<EOF
          deb https://mirrors.tuna.tsinghua.edu.cn/debian bookworm main contrib non-free non-free-firmware
          deb https://mirrors.tuna.tsinghua.edu.cn/debian-security bookworm-security main contrib non-free non-free-firmware
          deb https://mirrors.tuna.tsinghua.edu.cn/debian bookworm-updates main contrib non-free non-free-firmware
          EOF
          apt update
          apt install -y ssh net-tools iproute2 iputils-ping network-manager iw wireless-tools sudo bash-completion wget curl nano
          systemctl enable ssh
          systemctl enable NetworkManager
          apt clean
          '

          sudo rm -f rootfs/usr/bin/qemu-arm-static

          git clone --depth=1 https://github.com/MrArtemSid/linux-msm89x7.git -b main kernel
          cd kernel
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- santoni_defconfig
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- -j$(nproc) zImage dtbs modules
          sudo make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- INSTALL_MOD_PATH=../rootfs modules_install
          cp arch/arm/boot/zImage "$WORKDIR"/
          cp arch/arm/boot/dts/qcom/qcom-msm8940-xiaomi-santoni.dtb "$WORKDIR"/

          cd "$WORKDIR"
          mkdir -p bootfs
          cp zImage qcom-msm8940-xiaomi-santoni.dtb bootfs/

          cat > bootfs/extlinux.conf <<EOF
          default debian
          label debian
            kernel /zImage
            fdt /qcom-msm8940-xiaomi-santoni.dtb
            append root=/dev/mmcblk0p22 rw rootwait console=tty1
          EOF

          dd if=/dev/zero of=boot.img bs=1M count=256
          mkfs.ext2 -F boot.img
          mkdir -p /mnt/boot
          sudo mount boot.img /mnt/boot
          sudo cp -r bootfs/* /mnt/boot/
          sudo umount /mnt/boot

          dd if=/dev/zero of=rootfs.img bs=1M count=8192
          mkfs.ext4 -F rootfs.img
          mkdir -p /mnt/root
          sudo mount rootfs.img /mnt/root
          sudo cp -a rootfs/* /mnt/root/
          sudo umount /mnt/root

      - name: Upload images
        uses: actions/upload-artifact@v4
        with:
          name: debian-santoni-final
          path: |
            /home/runner/debian/boot.img
            /home/runner/debian/rootfs.img

