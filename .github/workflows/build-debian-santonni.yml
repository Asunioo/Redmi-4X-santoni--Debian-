name: Build Debian for Redmi 4X santoni
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y debootstrap qemu-user-static binfmt-support
          sudo apt install -y gcc-arm-linux-gnueabihf libssl-dev bc flex bison git make kmod cpio rsync

      - name: Build Debian Image
        run: |
          set -e
          DEBIAN_VERSION="bookworm"
          WORK_DIR="$HOME/debian-santoni"
          OUTPUT_DIR="$WORK_DIR/output"
          mkdir -p "$WORK_DIR"/{rootfs,boot,"$OUTPUT_DIR"}

          # Build rootfs
          sudo debootstrap --arch=armhf --foreign "$DEBIAN_VERSION" "$WORK_DIR"/rootfs http://mirrors.ustc.edu.cn/debian/
          sudo cp /usr/bin/qemu-arm-static "$WORK_DIR"/rootfs/usr/bin/
          sudo chroot "$WORK_DIR"/rootfs /debootstrap/debootstrap --second-stage

          # Configure rootfs
          sudo chroot "$WORK_DIR"/rootfs bash -c "
            echo 'root:root' | chpasswd
            echo 'deb http://mirrors.ustc.edu.cn/debian bookworm main contrib non-free-firmware' > /etc/apt/sources.list
            apt update -y
            apt install -y linux-firmware firmware-qcom-soc network-manager openssh-server
            systemctl enable ssh
            apt clean
          "
          sudo rm -f "$WORK_DIR"/rootfs/usr/bin/qemu-arm-static

          # Compile kernel
          git clone https://github.com/ultra-azu/linux-santoni.git -b 6.6.y "$WORK_DIR"/kernel
          cd "$WORK_DIR"/kernel
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- santoni_defconfig
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- -j$(nproc) zImage dtbs modules
          sudo make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- INSTALL_MOD_PATH="$WORK_DIR"/rootfs modules_install
          cp arch/arm/boot/zImage "$WORK_DIR"/boot/
          cp arch/arm/boot/dts/qcom-msm8940-xiaomi-santoni.dtb "$WORK_DIR"/boot/

          # Make boot.img
          cd "$WORK_DIR"
          dd if=/dev/zero of="$OUTPUT_DIR"/boot.img bs=1M count=256
          mkfs.ext2 -F "$OUTPUT_DIR"/boot.img
          sudo mkdir -p /mnt/boot
          sudo mount "$OUTPUT_DIR"/boot.img /mnt/boot
          sudo cp boot/* /mnt/boot/
          sudo mkdir -p /mnt/boot/extlinux
          echo "default debian
          label debian
            kernel /zImage
            fdt /qcom-msm8940-xiaomi-santoni.dtb
            append root=/dev/mmcblk0p22 rw rootwait" | sudo tee /mnt/boot/extlinux/extlinux.conf
          sudo umount /mnt/boot

          # Make rootfs.img
          dd if=/dev/zero of="$OUTPUT_DIR"/rootfs.img bs=1M count=8192
          mkfs.ext4 -F "$OUTPUT_DIR"/rootfs.img
          sudo mkdir -p /mnt/root
          sudo mount "$OUTPUT_DIR"/rootfs.img /mnt/root
          sudo tar -cf - -C "$WORK_DIR"/rootfs . | sudo tar -xf - -C /mnt/root
          sudo umount /mnt/root

      - name: Upload Images
        uses: actions/upload-artifact@v4
        with:
          name: debian-santoni-images
          path: /home/runner/debian-santoni/output/

