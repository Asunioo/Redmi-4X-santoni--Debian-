name: Build Debian for Redmi 4X (santoni)

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许你手动点击运行

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            qemu-user-static \
            binfmt-support \
            systemd-container \
            wget \
            curl

      - name: Check if Debian server is reachable
        run: |
          echo "Checking Debian mirror..."
          wget -q --spider http://deb.debian.org/debian/dists/bookworm/Release
          if [ $? -ne 0 ]; then
            echo "❌ Debian mirror not reachable!"
            exit 1
          fi
          echo "✅ OK"

      - name: Create rootfs directory
        run: mkdir -p debian-rootfs

      - name: First stage - Download Debian packages (armhf)
        run: |
          sudo debootstrap \
            --arch=armhf \
            --foreign \
            --include=init,systemd-sysv,openssh-server,net-tools,iputils-ping,wget,curl,locales,sudo \
            bookworm \
            debian-rootfs \
            http://deb.debian.org/debian/

      - name: Second stage - Finish setup inside emulated environment
        run: |
          sudo cp /usr/bin/qemu-arm-static debian-rootfs/usr/bin/
          sudo systemd-nspawn -D debian-rootfs /debootstrap/debootstrap --second-stage

      - name: Basic configuration
        run: |
          ROOTFS="debian-rootfs"

          # Set device name
          echo "redmi4x-debian" | sudo tee $ROOTFS/etc/hostname

          # Set root password to "debian" (change later on device!)
          echo 'root:debian' | sudo chpasswd -R $ROOTFS

          # Generate English locale
          echo 'en_US.UTF-8 UTF-8' | sudo tee $ROOTFS/etc/locale.gen
          sudo systemd-nspawn -D $ROOTFS locale-gen

      - name: Compress final image
        run: |
          tar -cJf debian-redmi4x-rootfs.tar.xz -C debian-rootfs .

      - name: Upload as downloadable file
        uses: actions/upload-artifact@v4
        with:
          name: debian-redmi4x-rootfs
          path: debian-redmi4x-rootfs.tar.xz
          retention-days: 7

      - name: Show file size
        run: ls -lh debian-redmi4x-rootfs.tar.xz
