name: Build Redmi 4X (santoni) Boot.img
on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-santoni-bootimg.yml'
  workflow_dispatch:

jobs:
  build-bootimg:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-

    steps:
      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y git build-essential gcc-aarch64-linux-gnu bc bison flex libssl-dev python3 cpio kmod mkbootimg

      - name: Clone LineageOS kernel for santoni
        run: |
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_xiaomi_msm8937.git linux-santoni

      - name: Make santoni_defconfig
        run: |
          cd linux-santoni
          make ARCH=$ARCH santoni_defconfig

      - name: Build kernel Image.gz dtbs
        run: |
          cd linux-santoni
          make -j$(nproc) ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE Image.gz dtbs

      - name: List DTB to check path
        run: |
          cd linux-santoni
          ls -l arch/arm64/boot/dts/vendor/qcom/

      - name: Build minimal initramfs
        run: |
          mkdir -p initramfs || { echo "Failed to create initramfs dir"; exit 1; }
          cat > initramfs/init <<'EOF'
          #!/bin/sh
          mount -t devtmpfs devtmpfs /dev
          mount -t proc proc /proc
          mount -t sysfs sysfs /sys
          exec switch_root /sysroot /sbin/init
          EOF
          chmod +x initramfs/init || sudo chmod +x initramfs/init
          cd initramfs || { echo "Failed to cd into initramfs"; exit 1; }
          # 修复后的第47行
          find . -print0 | cpio --null -ov --format=newc 2>/dev/null | gzip -9 > ../initramfs.gz
          # 校验生成结果
          if [ ! -f ../initramfs.gz ] || [ ! -s ../initramfs.gz ]; then
            echo "Error: initramfs.gz not generated or empty!"
            ls -lh ../
            exit 1
          fi
          ls -lh ../initramfs.gz

      - name: Make boot.img
        run: |
          mkbootimg \
            --kernel linux-santoni/arch/arm64/boot/Image.gz \
            --ramdisk initramfs.gz \
            --dtb linux-santoni/arch/arm64/boot/dts/vendor/qcom/msm8937-xiaomi-santoni.dtb \
            --base 0x80000000 \
            --pagesize 2048 \
            --cmdline "console=ttyMSM0,115200 root=/dev/mmcblk0p22 rootwait rw" \
            --output santoni-debian-boot.img

      - name: Check result
        run: file santoni-debian-boot.img

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: santoni-boot-img
          path: santoni-debian-boot.img
          retention-days: 30
